<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Fita</title>

  <script type="importmap">
  {
    "imports": {

    "three":
      "https://unpkg.com/three@0.160.0/build/three.module.js",

    "three/addons/":
      "https://unpkg.com/three@0.160.0/examples/jsm/",

    "mindar-image-three":
      "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
  }
  }
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: black;
      font-family: sans-serif;
      color: white;
    }

    .mindar-ui-overlay,
    .mindar-ui-scanning,
    .mindar-ui-loading {
      display: none !important;
    }

    #ar-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #start-btn {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;

      padding: 1rem 2rem;
      border: none;
      border-radius: 8px;

      background: #c9a84c;
      color: black;

      font-size: 1rem;
      cursor: pointer;
    }

    #status {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);

      z-index: 20;

      background: rgba(0,0,0,0.7);
      padding: 0.6rem 1.2rem;
      border-radius: 999px;

      font-size: 0.85rem;

      display: none;
      opacity: 1;

      transition: opacity 0.5s;
    }
  </style>
</head>

<body>

<button id="start-btn">Iniciar AR</button>

<div id="status"></div>

<div id="ar-container"></div>

<script type="module">

import * as THREE from 'three';
import { MindARThree } from 'mindar-image-three';

const status = document.getElementById('status');
const startBtn = document.getElementById('start-btn');

function showStatus(msg) {

  status.style.display = 'block';
  status.style.opacity = '1';
  status.textContent = msg;

  setTimeout(() => {
    status.style.opacity = '0';
  }, 2000);

  setTimeout(() => {
    status.style.display = 'none';
    status.style.opacity = '1';
  }, 2600);
}

startBtn.addEventListener('click', async () => {

  startBtn.style.display = 'none';

  // -------------------------
  // VIDEO
  // -------------------------

  const video = document.createElement('video');

  video.src = 'assets/video.mp4';
  video.crossOrigin = 'anonymous';

  video.loop = true;
  video.muted = false;
  video.volume=1;
  video.playsInline = true;
  video.preload = 'auto';

  const videoTexture = new THREE.VideoTexture(video);

  videoTexture.minFilter = THREE.LinearFilter;
  videoTexture.magFilter = THREE.LinearFilter;

  // -------------------------
  // MINDAR
  // -------------------------

  const mindarThree = new MindARThree({
    container: document.getElementById('ar-container'),
    imageTargetSrc: 'assets/targets.mind',

    maxTrack: 1,

    uiLoading: 'no',
    uiScanning: 'no',
    uiError: 'no',
  });

  const { renderer, scene, camera } = mindarThree;

  // -------------------------
  // LUZ
  // -------------------------

  const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);

  scene.add(light);

  // -------------------------
  // ANCHOR
  // -------------------------

  const anchor = mindarThree.addAnchor(0);

  // -------------------------
  // VIDEO MESH
  // -------------------------

  const videoGeometry = new THREE.PlaneGeometry(0.6, 0.338);

  const videoMaterial = new THREE.MeshBasicMaterial({
    map: videoTexture,
    transparent: true,
    side: THREE.DoubleSide
  });

  const videoMesh = new THREE.Mesh(
    videoGeometry,
    videoMaterial
  );

  // posição ao lado da imagem
  videoMesh.position.set(0.8, 0, 0);

  videoMesh.visible = false;

  anchor.group.add(videoMesh);

  // -------------------------
  // CANTOS VERDES AR
  // -------------------------

  const createCorner = (x, y, rotation = 0) => {

    const group = new THREE.Group();

    const material = new THREE.MeshBasicMaterial({
      color: 0x00ff00,
      side: THREE.DoubleSide
    });

    // linha horizontal
    const horizontal = new THREE.Mesh(
      new THREE.PlaneGeometry(0.08, 0.01),
      material
    );

    // linha vertical
    const vertical = new THREE.Mesh(
      new THREE.PlaneGeometry(0.01, 0.08),
      material
    );

    horizontal.position.set(0.035, 0, 0);
    vertical.position.set(0, -0.035, 0);

    group.add(horizontal);
    group.add(vertical);

    group.position.set(x, y, 0);

    group.rotation.z = rotation;

    return group;
  };

  const corners = new THREE.Group();

  // topo esquerdo
  corners.add(createCorner(-0.32, 0.18, 0));

  // topo direito
  corners.add(createCorner(0.32, 0.18, Math.PI / 2));

  // baixo esquerdo
  corners.add(createCorner(-0.32, -0.18, -Math.PI / 2));

  // baixo direito
  corners.add(createCorner(0.32, -0.18, Math.PI));

  corners.visible = false;

  anchor.group.add(corners);

  // -------------------------
  // TARGET FOUND
  // -------------------------

  anchor.onTargetFound = async () => {

    corners.visible = true;

    videoMesh.visible = true;

    try {
      const playPromise = video.play();

if (playPromise !== undefined) {

  playPromise
    .then(() => {

      console.log('Vídeo com som');

    })
    .catch(err => {

      console.error(err);

      showStatus('Toque para ativar som');

      // fallback
      document.body.addEventListener('click', async () => {

        await video.play();

      }, { once: true });
    });
}

      showStatus('▶ A reproduzir');

    } catch(err) {

      console.error(err);

      showStatus('Erro no vídeo');
    }
  };

  // -------------------------
  // TARGET LOST
  // -------------------------

  anchor.onTargetLost = () => {

    corners.visible = false;

    videoMesh.visible = false;

    video.pause();

    showStatus('Tracking perdido');
  };

  // -------------------------
  // START AR
  // -------------------------

  try {

    await mindarThree.start();

    renderer.setAnimationLoop(() => {

      renderer.render(scene, camera);

    });

  } catch(err) {

    console.error(err);

    showStatus('Erro: ' + err.message);
  }

});

</script>

</body>
</html>
