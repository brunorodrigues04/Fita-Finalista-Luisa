<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Câmara AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: sans-serif; color: white; }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: none;
    }

    #btn {
      padding: 1rem 2rem;
      background: #c9a84c;
      color: #000;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 4px;
    }

    #msg {
      position: fixed;
      top: 20px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      padding: 0.5rem 1rem;
      border-radius: 4px;
      font-size: 0.85rem;
      display: none;
    }
  </style>
</head>
<body>

<button id="btn">Abrir Câmara</button>
<video id="video" autoplay playsinline></video>
<div id="msg"></div>

<script>
  document.getElementById('btn').addEventListener('click', async () => {
    const msg = document.getElementById('msg');
    const video = document.getElementById('video');

    msg.style.display = 'block';
    msg.textContent = 'A pedir acesso à câmara...';

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' }, // câmara traseira
        audio: false
      });

      video.srcObject = stream;
      video.style.display = 'block';
      document.getElementById('btn').style.display = 'none';
      msg.textContent = '✓ Câmara activa';
      setTimeout(() => { msg.style.display = 'none'; }, 2000);

    } catch (err) {
      msg.textContent = 'Erro: ' + err.message;
      console.error(err);
    }
  });
</script>
</body>
</html>
