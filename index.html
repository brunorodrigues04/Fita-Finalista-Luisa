<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Persistente</title>

  <script type="importmap">
  {
    "imports": {

      "three":
        "https://unpkg.com/three@0.160.0/build/three.module.js",

      "three/addons/":
        "https://unpkg.com/three@0.160.0/examples/jsm/",

      "mindar-image-three":
        "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      width:100vw;
      height:100vh;
      overflow:hidden;
      background:black;
      font-family:sans-serif;
      color:white;
    }

    #ar-container {
      width:100vw;
      height:100vh;
    }

    #start-btn {
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      z-index:20;
      padding:1rem 2rem;
      background:#c9a84c;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    #status {
      position:fixed;
      top:20px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.7);
      padding:0.6rem 1.2rem;
      border-radius:999px;
      display:none;
      z-index:20;
    }
  </style>
</head>

<body>

<button id="start-btn">Iniciar AR</button>
<div id="status"></div>
<div id="ar-container"></div>

<script type="module">

import * as THREE from 'three';
import { MindARThree } from 'mindar-image-three';

const status = document.getElementById('status');
const startBtn = document.getElementById('start-btn');

function showStatus(msg){
  status.style.display = 'block';
  status.textContent = msg;
  setTimeout(()=> status.style.display = 'none', 2000);
}

startBtn.addEventListener('click', async ()=>{

  startBtn.style.display = 'none';

  // ---------------- VIDEO ----------------
  const video = document.createElement('video');

  video.src = 'assets/video.mp4';
  video.loop = true;
  video.muted = false;
  video.volume = 1;
  video.playsInline = true;

  const videoTexture = new THREE.VideoTexture(video);

  // ---------------- MINDAR ----------------
  const mindarThree = new MindARThree({

    container: document.getElementById('ar-container'),
    imageTargetSrc: 'assets/targets.mind',
    maxTrack: 1,

    // 🔥 MELHOR ESTABILIDADE
    filterMinCF: 0.001,
    filterBeta: 0.01,
    warmupTolerance: 3,
    missTolerance: 20,

    uiLoading: 'no',
    uiScanning: 'no',
    uiError: 'no',
  });

  const { renderer, scene, camera } = mindarThree;

  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  // ---------------- GRUPO FIXO ----------------
  const persistentGroup = new THREE.Group();
  scene.add(persistentGroup);

  let locked = false;
  let stableFrames = 0;

  // ---------------- ANCHOR ----------------
  const anchor = mindarThree.addAnchor(0);

  // ---------------- VIDEO ----------------
  const videoMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(0.6, 0.338),
    new THREE.MeshBasicMaterial({ map: videoTexture })
  );

  videoMesh.position.set(0.8, 0, 0);
  videoMesh.visible = false;

  // ---------------- CANTOS ----------------
  const corners = new THREE.Group();

  const makeCorner = (x,y,r=0)=>{
    const g = new THREE.Group();
    const mat = new THREE.MeshBasicMaterial({ color:0x00ff00 });

    const h = new THREE.Mesh(new THREE.PlaneGeometry(0.08,0.01), mat);
    const v = new THREE.Mesh(new THREE.PlaneGeometry(0.01,0.08), mat);

    h.position.set(0.035,0,0);
    v.position.set(0,-0.035,0);

    g.add(h); g.add(v);
    g.position.set(x,y,0);
    g.rotation.z = r;

    return g;
  };

  corners.add(makeCorner(-0.32,0.18,0));
  corners.add(makeCorner(0.32,0.18,Math.PI/2));
  corners.add(makeCorner(-0.32,-0.18,-Math.PI/2));
  corners.add(makeCorner(0.32,-0.18,Math.PI));

  corners.visible = false;

  // ---------------- TRACKED GROUP ----------------
  const trackedGroup = new THREE.Group();
  trackedGroup.add(videoMesh);
  trackedGroup.add(corners);
  anchor.group.add(trackedGroup);

  // ---------------- FIXAÇÃO ESTÁVEL ----------------
  anchor.onTargetFound = async ()=>{

    stableFrames++;

    if(stableFrames < 5) return;

    if(locked) return;

    locked = true;

    showStatus("AR fixado");

    corners.visible = true;
    videoMesh.visible = true;

    anchor.group.updateWorldMatrix(true,true);

    trackedGroup.getWorldPosition(persistentGroup.position);
    trackedGroup.getWorldQuaternion(persistentGroup.quaternion);
    trackedGroup.getWorldScale(persistentGroup.scale);

    anchor.group.remove(trackedGroup);

    persistentGroup.add(videoMesh);
    persistentGroup.add(corners);

    persistentGroup.scale.set(0.001,0.001,0.001);

    let s = 0.001;

    const anim = ()=>{

      s += (1 - s) * 0.1;

      persistentGroup.scale.set(s,s,s);

      if(s < 0.99) requestAnimationFrame(anim);
    };

    anim();

    try {
      await video.play();
    } catch(e){
      document.body.addEventListener('click', ()=>video.play(), { once:true });
    }
  };

  // ---------------- START ----------------
  try {

    await mindarThree.start();

    renderer.setAnimationLoop(()=>{

      // 🔥 evita freeze visual
      if(mindarThree.video.readyState >= 2){
        renderer.render(scene,camera);
      }

    });

    showStatus("AR iniciado");

  } catch(err){
    showStatus("Erro: " + err.message);
  }

});

</script>

</body>
</html>
