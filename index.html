<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Fita</title>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden; font-family: sans-serif; color: white; }

    .mindar-ui-overlay,
    .mindar-ui-scanning,
    .mindar-ui-loading { display: none !important; }

    #start-btn {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      padding: 1rem 2rem;
      background: #c9a84c; color: #000;
      border: none; font-size: 1rem;
      cursor: pointer; border-radius: 4px;
      z-index: 10;
    }

    #status {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      padding: 0.5rem 1.2rem; border-radius: 20px;
      font-size: 0.8rem; z-index: 10;
      text-align: center;
      transition: opacity 0.5s;
      display: none;
    }

    #ar-container { width: 100vw; height: 100vh; }
  </style>
</head>
<body>

<button id="start-btn">Iniciar AR</button>
<div id="status">Aponta para a fita...</div>
<div id="ar-container"></div>

<script type="module">
import * as THREE from 'three';
import { MindARThree } from 'mindar-image-three';

const status = document.getElementById('status');
let experienceTriggered = false;
let videoMesh = null;

document.getElementById('start-btn').addEventListener('click', async () => {
  document.getElementById('start-btn').style.display = 'none';

  // ── Preparar vídeo HTML (fora do Three.js) ──
  const video = document.createElement('video');
  video.src = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4';
  video.crossOrigin = 'anonymous';
  video.loop = true;
  video.muted = true; // muted para autoplay funcionar no mobile
  video.playsInline = true;
  video.preload = 'auto';

  // ── Three.js VideoTexture ──
  const videoTexture = new THREE.VideoTexture(video);
  videoTexture.minFilter = THREE.LinearFilter;
  videoTexture.magFilter = THREE.LinearFilter;

  const mindarThree = new MindARThree({
    container: document.getElementById('ar-container'),
    imageTargetSrc: 'assets/targets.mind',
    maxTrack: 1,
    uiLoading: 'no',
    uiScanning: 'no',
    uiError: 'no',
  });

  const { renderer, scene, camera } = mindarThree;

  // Plano de vídeo — proporção 16:9
  videoMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(0.6, 0.338),
    new THREE.MeshBasicMaterial({ map: videoTexture, side: THREE.DoubleSide })
  );
  // Começa invisível
  videoMesh.visible = false;

  const anchor = mindarThree.addAnchor(0);

  anchor.onTargetFound = () => {
    if (experienceTriggered) return;
    experienceTriggered = true;

    // Obter posição mundial da fita
    const worldPos = new THREE.Vector3();
    anchor.group.getWorldPosition(worldPos);

    // Colocar o vídeo no ar, acima da posição da fita
    videoMesh.position.set(worldPos.x, worldPos.y + 0.3, worldPos.z);

    // Orientar o vídeo para a câmara
    videoMesh.lookAt(camera.position);

    scene.add(videoMesh);
    videoMesh.visible = true;

    // Reproduzir vídeo
    video.play().then(() => {
      status.style.display = 'block';
      status.textContent = '▶ Vídeo a reproduzir';
      setTimeout(() => { status.style.opacity = '0'; }, 2000);
      setTimeout(() => { status.style.display = 'none'; status.style.opacity = '1'; }, 2600);
    }).catch(err => {
      console.error('Erro ao reproduzir vídeo:', err);
    });
  };

  anchor.onTargetLost = () => {
    // Vídeo fica no ar — não para
  };

  try {
    await mindarThree.start();

    renderer.setAnimationLoop(() => {
      // Vídeo sempre virado para a câmara
      if (videoMesh && videoMesh.visible) {
        videoMesh.lookAt(camera.position);
      }
      renderer.render(scene, camera);
    });

  } catch(err) {
    status.style.display = 'block';
    status.textContent = 'Erro: ' + err.message;
    console.error(err);
  }
});
</script>
</body>
</html>
