
<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Fita</title>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overscroll-behavior: none;
      touch-action: none;
    }

    .mindar-ui-overlay,
    .mindar-ui-scanning,
    .mindar-ui-loading,
    .mindar-ui-error {
      display: none !important;
    }

    #ar-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
    }

    /*
      MindAR cria o video da camara com z-index negativo.
      Alguns browsers deixam esse video atras do fundo do container.
      Estes estilos garantem a ordem correta: camera atras, canvas AR a frente.
    */
    #ar-container > video {
      z-index: 0 !important;
      display: block !important;
      pointer-events: none;
    }

    #ar-container > canvas {
      z-index: 1 !important;
    }

    #ar-container > div {
      z-index: 2 !important;
      pointer-events: none;
    }

    #start-btn,
    #close-video-btn {
      position: fixed;
      z-index: 50;
      border: 0;
      cursor: pointer;
      font: inherit;
    }

    #start-btn {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 1rem 1.6rem;
      border-radius: 999px;
      background: #c9a84c;
      color: #050505;
      font-weight: 700;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.45);
    }

    #start-btn:disabled {
      opacity: 0.65;
      cursor: default;
    }

    #status {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      z-index: 55;
      max-width: min(88vw, 520px);
      padding: 0.7rem 1.05rem;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      font-size: 0.88rem;
      line-height: 1.25;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.35s ease;
      backdrop-filter: blur(12px);
    }

    #status.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    #close-video-btn {
      top: 18px;
      right: 18px;
      display: none;
      padding: 0.65rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      backdrop-filter: blur(12px);
    }

    #close-video-btn.is-visible {
      display: block;
    }
  </style>
</head>
<body>
  <button id="start-btn" type="button">Iniciar AR</button>
  <div id="status" role="status" aria-live="polite"></div>
  <button id="close-video-btn" type="button">Fechar</button>
  <div id="ar-container"></div>

  <script type="module">
    import * as THREE from 'three';
    import { MindARThree } from 'mindar-image-three';

    const CONFIG = {
      containerSelector: '#ar-container',
      targetFile: 'assets/targets.mind',

      tracking: {
        maxTrack: 3,
        warmupTolerance: 3,
        missTolerance: 20,
        filterMinCF: 0.001,
        filterBeta: 1000,
        lostGraceMs: 750
      },

      camera: {
        facingMode: 'environment',
        width: { ideal: 1280 },
        height: { ideal: 720 }
      },

      theme: {
        gold: 0xc9a84c,
        green: 0x00ff66,
        dark: 0x050505
      },

      video: {
        width: 0.52,
        height: 1.08,
        z: 0.075,
        sideGap: 0.17
      },

      photos: {
        width: 0.42,
        height: 0.59,
        spacingX: 0.56,
        spacingY: 0.69,
        z: 0.06,
        columns: 3,
        offsetX: 0.35,
        offsetY: 0.06
      },

      interaction: {
        galleryActivation: 'tapTarget',
        autoOpenDelayMs: 650,
        targetHitWidth: 0.78,
        targetHitHeight: 0.5
      },

      targets: [
        {
          type: 'front',
          video: 'assets/video0.mp4',
          loop: true,
          position: { x: 0.68, y: 0.08, z: 0.075 }
        },
        {
          type: 'gallery',
          video: 'assets/video1.mp4',
          photos: [
            'assets/photos/target1/foto1.jpg',
            'assets/photos/target1/foto2.jpg',
            'assets/photos/target1/foto3.jpg',
            'assets/photos/target1/foto4.jpg',
            'assets/photos/target1/foto5.jpg',
            'assets/photos/target1/foto6.jpg'
          ]
        },
        {
          type: 'gallery',
          video: 'assets/video2.mp4',
          photos: [
            'assets/photos/target2/foto1.jpg',
            'assets/photos/target2/foto2.jpg',
            'assets/photos/target2/foto3.jpg',
            'assets/photos/target2/foto4.jpg',
            'assets/photos/target2/foto5.jpg',
            'assets/photos/target2/foto6.jpg'
          ]
        },
        {
          type: 'gallery',
          video: 'assets/video3.mp4',
          photos: [
            'assets/photos/target3/foto1.jpg',
            'assets/photos/target3/foto2.jpg',
            'assets/photos/target3/foto3.jpg',
            'assets/photos/target3/foto4.jpg',
            'assets/photos/target3/foto5.jpg',
            'assets/photos/target3/foto6.jpg'
          ]
        },
        {
          type: 'gallery',
          video: 'assets/video4.mp4',
          photos: [
            'assets/photos/target4/foto1.jpg',
            'assets/photos/target4/foto2.jpg',
            'assets/photos/target4/foto3.jpg',
            'assets/photos/target4/foto4.jpg',
            'assets/photos/target4/foto5.jpg',
            'assets/photos/target4/foto6.jpg'
          ]
        },
        {
          type: 'gallery',
          video: 'assets/video5.mp4',
          photos: [
            'assets/photos/target5/foto1.jpg',
            'assets/photos/target5/foto2.jpg',
            'assets/photos/target5/foto3.jpg',
            'assets/photos/target5/foto4.jpg',
            'assets/photos/target5/foto5.jpg',
            'assets/photos/target5/foto6.jpg'
          ]
        },
        {
          type: 'gallery',
          video: 'assets/video6.mp4',
          photos: [
            'assets/photos/target6/foto1.jpg',
            'assets/photos/target6/foto2.jpg',
            'assets/photos/target6/foto3.jpg',
            'assets/photos/target6/foto4.jpg',
            'assets/photos/target6/foto5.jpg',
            'assets/photos/target6/foto6.jpg'
          ]
        }
      ]
    };

    const $ = (selector) => document.querySelector(selector);
    const clamp01 = (value) => Math.min(1, Math.max(0, value));
    const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);

    class StatusToast {
      constructor(element) {
        this.element = element;
        this.hideTimer = null;
      }

      show(message, duration = 2300) {
        window.clearTimeout(this.hideTimer);
        this.element.textContent = message;
        this.element.classList.add('is-visible');

        if (duration > 0) {
          this.hideTimer = window.setTimeout(() => this.hide(), duration);
        }
      }

      hide() {
        window.clearTimeout(this.hideTimer);
        this.element.classList.remove('is-visible');
      }
    }

    class Tween {
      static to({ duration = 300, onUpdate, onComplete }) {
        let frameId = 0;
        let cancelled = false;
        const start = performance.now();

        const tick = (now) => {
          if (cancelled) return;

          const progress = clamp01((now - start) / duration);
          onUpdate(easeOutCubic(progress), progress);

          if (progress < 1) {
            frameId = requestAnimationFrame(tick);
          } else if (onComplete) {
            onComplete();
          }
        };

        frameId = requestAnimationFrame(tick);

        return () => {
          cancelled = true;
          cancelAnimationFrame(frameId);
        };
      }
    }

    function setObjectOpacity(root, opacity) {
      root.traverse((object) => {
        const material = object.material;
        if (!material) return;

        const materials = Array.isArray(material) ? material : [material];
        materials.forEach((mat) => {
          mat.transparent = true;
          mat.opacity = opacity;
          mat.needsUpdate = true;
        });
      });
    }

    function disposeMaterial(material) {
      if (!material) return;

      if (Array.isArray(material)) {
        material.forEach(disposeMaterial);
        return;
      }

      if (material.map) material.map.dispose();
      material.dispose?.();
    }

    function disposeObject3D(object) {
      object.traverse((child) => {
        child.geometry?.dispose?.();
        disposeMaterial(child.material);
      });
    }

    function createVideoElement(src, { loop = false, muted = false } = {}) {
      const video = document.createElement('video');

      video.crossOrigin = 'anonymous';
      video.loop = loop;
      video.muted = muted;
      video.volume = 1;
      video.playsInline = true;
      video.preload = 'auto';
      video.setAttribute('playsinline', '');
      video.setAttribute('webkit-playsinline', '');
      video.src = src;
      video.load();

      return video;
    }

    async function playVideoWithFallback(video, toast) {
      try {
        await video.play();
        return true;
      } catch (error) {
        toast.show('Toca no ecrã para ativar o som', 0);

        const unlock = async () => {
          try {
            await video.play();
            toast.hide();
          } catch (err) {
            toast.show('O browser bloqueou o som', 2200);
          }
        };

        window.addEventListener('pointerdown', unlock, { once: true });
        return false;
      }
    }

    function createFrame(width, height, color = CONFIG.theme.gold) {
      const group = new THREE.Group();
      const thickness = 0.018;
      const mat = new THREE.MeshBasicMaterial({
        color,
        transparent: true,
        opacity: 0.95,
        side: THREE.DoubleSide
      });

      const top = new THREE.Mesh(new THREE.PlaneGeometry(width + thickness * 2, thickness), mat.clone());
      const bottom = new THREE.Mesh(new THREE.PlaneGeometry(width + thickness * 2, thickness), mat.clone());
      const left = new THREE.Mesh(new THREE.PlaneGeometry(thickness, height + thickness * 2), mat.clone());
      const right = new THREE.Mesh(new THREE.PlaneGeometry(thickness, height + thickness * 2), mat.clone());

      top.position.set(0, height / 2 + thickness / 2, -0.002);
      bottom.position.set(0, -height / 2 - thickness / 2, -0.002);
      left.position.set(-width / 2 - thickness / 2, 0, -0.002);
      right.position.set(width / 2 + thickness / 2, 0, -0.002);

      group.add(top, bottom, left, right);
      return group;
    }

    function createBackplate(width, height, opacity = 0.58) {
      return new THREE.Mesh(
        new THREE.PlaneGeometry(width, height),
        new THREE.MeshBasicMaterial({
          color: CONFIG.theme.dark,
          transparent: true,
          opacity,
          side: THREE.DoubleSide
        })
      );
    }

    function createCorners() {
      const group = new THREE.Group();
      const size = 0.085;
      const thickness = 0.01;
      const x = 0.34;
      const y = 0.2;

      const makeCorner = (px, py, rotation) => {
        const corner = new THREE.Group();
        const mat = new THREE.MeshBasicMaterial({
          color: CONFIG.theme.green,
          transparent: true,
          opacity: 1,
          side: THREE.DoubleSide
        });

        const horizontal = new THREE.Mesh(new THREE.PlaneGeometry(size, thickness), mat.clone());
        const vertical = new THREE.Mesh(new THREE.PlaneGeometry(thickness, size), mat.clone());

        horizontal.position.set(size / 2 - thickness / 2, 0, 0);
        vertical.position.set(0, -size / 2 + thickness / 2, 0);

        corner.add(horizontal, vertical);
        corner.position.set(px, py, 0.09);
        corner.rotation.z = rotation;

        return corner;
      };

      group.add(makeCorner(-x, y, 0));
      group.add(makeCorner(x, y, Math.PI / 2));
      group.add(makeCorner(-x, -y, -Math.PI / 2));
      group.add(makeCorner(x, -y, Math.PI));

      group.visible = false;
      return group;
    }

    function createVideoPanel(video, { width, height }) {
      const group = new THREE.Group();
      const texture = new THREE.VideoTexture(video);

      texture.minFilter = THREE.LinearFilter;
      texture.magFilter = THREE.LinearFilter;
      texture.colorSpace = THREE.SRGBColorSpace;

      const shadow = createBackplate(width + 0.08, height + 0.08, 0.45);
      shadow.position.set(0.025, -0.025, -0.018);

      const videoMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(width, height),
        new THREE.MeshBasicMaterial({
          map: texture,
          transparent: true,
          opacity: 1,
          side: THREE.DoubleSide
        })
      );

      group.add(shadow);
      group.add(createFrame(width, height));
      group.add(videoMesh);

      group.userData.video = video;
      group.userData.texture = texture;
      group.userData.videoMesh = videoMesh;

      return group;
    }

    function createTargetHitArea(controller) {
      const material = new THREE.MeshBasicMaterial({
        transparent: true,
        opacity: 0,
        depthWrite: false,
        side: THREE.DoubleSide
      });

      const mesh = new THREE.Mesh(
        new THREE.PlaneGeometry(
          CONFIG.interaction.targetHitWidth,
          CONFIG.interaction.targetHitHeight
        ),
        material
      );

      mesh.position.z = CONFIG.photos.z + 0.18;
      mesh.userData.isTargetHitArea = true;
      mesh.userData.controller = controller;

      return mesh;
    }

    function createPhotoCard(url, controller, index) {
      const { width, height } = CONFIG.photos;
      const group = new THREE.Group();
      const texture = new THREE.TextureLoader().load(url);

      texture.colorSpace = THREE.SRGBColorSpace;

      const backplate = createBackplate(width + 0.035, height + 0.035, 0.54);
      backplate.position.z = -0.009;

      const image = new THREE.Mesh(
        new THREE.PlaneGeometry(width, height),
        new THREE.MeshBasicMaterial({
          map: texture,
          transparent: true,
          opacity: 1,
          side: THREE.DoubleSide
        })
      );

      image.userData.isPhoto = true;
      image.userData.photoIndex = index;
      image.userData.controller = controller;
      image.userData.cardGroup = group;

      group.userData.isPhotoCard = true;
      group.userData.imageMesh = image;
      group.add(backplate, createFrame(width, height), image);
      group.visible = false;

      return { group, image };
    }

    class VideoOverlayManager {
      constructor(app) {
        this.app = app;
        this.current = null;
        this.closeButton = $('#close-video-btn');
        this.closeButton.addEventListener('click', () => this.close());
      }

      belongsTo(controller) {
        return this.current?.controller === controller;
      }

      async open({ src, controller }) {
        if (!src || !controller?.worldGroup?.visible) return;

        if (this.current?.controller === controller) {
          return;
        }

        if (this.current) {
          this.close({ instant: true });
        }

        const video = createVideoElement(src, { loop: false, muted: false });
        const panel = createVideoPanel(video, CONFIG.video);
        const position = controller.getSideVideoPosition();

        panel.position.set(position.x, position.y, position.z);
        panel.scale.setScalar(0.92);
        setObjectOpacity(panel, 0);

        controller.worldGroup.add(panel);

        this.current = { controller, video, panel };
        this.closeButton.classList.add('is-visible');

        Tween.to({
          duration: 260,
          onUpdate: (t) => {
            panel.scale.setScalar(0.92 + t * 0.08);
            setObjectOpacity(panel, t);
          }
        });

        video.addEventListener('ended', () => this.close(), { once: true });
        await playVideoWithFallback(video, this.app.toast);
      }

      close({ instant = false } = {}) {
        if (!this.current) return;

        const { controller, video, panel } = this.current;
        this.current = null;
        this.closeButton.classList.remove('is-visible');

        const finish = () => {
          video.pause();
          video.removeAttribute('src');
          video.load();
          controller.worldGroup.remove(panel);
          disposeObject3D(panel);
        };

        if (instant) {
          finish();
          return;
        }

        Tween.to({
          duration: 220,
          onUpdate: (t) => {
            setObjectOpacity(panel, 1 - t);
            panel.scale.setScalar(1 - t * 0.04);
          },
          onComplete: finish
        });
      }
    }

    class TargetController {
      constructor(app, index, targetConfig) {
        this.app = app;
        this.index = index;
        this.config = targetConfig;
        this.anchor = app.mindarThree.addAnchor(index);
        this.worldGroup = new THREE.Group();
        this.worldGroup.matrixAutoUpdate = false;
        this.worldGroup.visible = false;
        this.app.scene.add(this.worldGroup);

        this.isTracking = false;
        this.hasCompletedIntro = false;
        this.hasBuiltContent = false;
        this.lostTimer = null;
        this.introTimer = null;
        this.autoOpenTimer = null;
        this.sequenceId = 0;
        this.photoCards = [];
        this.photoPickMeshes = [];
        this.targetHitArea = null;
        this.frontVideo = null;
        this.frontPanel = null;

        this.corners = createCorners();
        this.worldGroup.add(this.corners);

        if (this.config.type === 'front') {
          this.createFrontContent();
        }

        if (this.config.type === 'gallery') {
          this.targetHitArea = createTargetHitArea(this);
          this.worldGroup.add(this.targetHitArea);
          this.app.registerTargetPickMesh(this.targetHitArea);
        }

        this.anchor.onTargetFound = () => this.handleFound();
        this.anchor.onTargetLost = () => this.handleLost();
      }

      createFrontContent() {
        this.frontVideo = createVideoElement(this.config.video, {
          loop: this.config.loop,
          muted: false
        });

        this.frontPanel = createVideoPanel(this.frontVideo, CONFIG.video);
        this.frontPanel.position.set(
          this.config.position.x,
          this.config.position.y,
          this.config.position.z
        );
        this.frontPanel.visible = false;
        setObjectOpacity(this.frontPanel, 0);

        this.worldGroup.add(this.frontPanel);
      }

      copyAnchorPose() {
        this.anchor.group.updateMatrixWorld(true);
        this.worldGroup.matrix.copy(this.anchor.group.matrixWorld);
        this.worldGroup.matrixWorldNeedsUpdate = true;
        this.worldGroup.updateMatrixWorld(true);
      }

      handleFound() {
        this.sequenceId += 1;
        this.isTracking = true;
        window.clearTimeout(this.lostTimer);
        this.copyAnchorPose();
        this.worldGroup.visible = true;

        if (this.config.type === 'front') {
          this.startFrontExperience(this.sequenceId);
        } else if (CONFIG.interaction.galleryActivation === 'auto') {
          this.startGalleryExperience(this.sequenceId);
        } else {
          this.prepareGalleryTarget();
        }
      }

      handleLost() {
        this.isTracking = false;
        window.clearTimeout(this.lostTimer);
        window.clearTimeout(this.autoOpenTimer);

        this.lostTimer = window.setTimeout(() => {
          if (this.isTracking) return;

          this.corners.visible = false;
          this.worldGroup.visible = false;

          if (this.frontVideo) {
            this.frontVideo.pause();
          }

          if (this.app.videoOverlay.belongsTo(this)) {
            this.app.videoOverlay.close({ instant: true });
          }
        }, CONFIG.tracking.lostGraceMs);
      }

      startIntroOnce(sequenceId, onReady) {
        if (this.hasCompletedIntro) {
          onReady();
          return;
        }

        this.corners.visible = true;
        setObjectOpacity(this.corners, 1);

        window.clearTimeout(this.introTimer);
        this.introTimer = window.setTimeout(() => {
          if (!this.isTracking || sequenceId !== this.sequenceId) return;

          Tween.to({
            duration: 360,
            onUpdate: (t) => setObjectOpacity(this.corners, 1 - t),
            onComplete: () => {
              this.corners.visible = false;
              setObjectOpacity(this.corners, 1);
              this.hasCompletedIntro = true;
              onReady();
            }
          });
        }, 650);
      }

      prepareGalleryTarget() {
        this.corners.visible = true;
        setObjectOpacity(this.corners, 1);
        this.app.toast.show('Toca na foto fisica para abrir', 1800);
      }

      activateGalleryFromTap() {
        if (this.config.type !== 'gallery') return;
        if (!this.isTracking || !this.worldGroup.visible) return;

        this.startGalleryExperience(this.sequenceId);
      }

      startFrontExperience(sequenceId) {
        this.startIntroOnce(sequenceId, async () => {
          if (!this.isTracking || !this.frontPanel) return;

          this.frontPanel.visible = true;

          Tween.to({
            duration: 320,
            onUpdate: (t) => {
              setObjectOpacity(this.frontPanel, t);
              this.frontPanel.scale.setScalar(0.94 + t * 0.06);
            }
          });

          await playVideoWithFallback(this.frontVideo, this.app.toast);
        });
      }

      startGalleryExperience(sequenceId) {
        this.startIntroOnce(sequenceId, () => {
          if (!this.isTracking) return;

          if (!this.hasBuiltContent) {
            this.buildGallery();
            this.hasBuiltContent = true;
          }

          this.showGallery();

          if (this.config.video) {
            this.app.toast.show('A abrir video...', 1400);
            this.scheduleAutoVideoOpen(sequenceId);
          }
        });
      }

      scheduleAutoVideoOpen(sequenceId) {
        if (!this.config.video) return;

        window.clearTimeout(this.autoOpenTimer);

        this.autoOpenTimer = window.setTimeout(() => {
          if (!this.isTracking || sequenceId !== this.sequenceId) return;

          this.app.videoOverlay.open({
            src: this.config.video,
            controller: this
          });
        }, CONFIG.interaction.autoOpenDelayMs);
      }

      getGalleryLayout() {
        const photos = this.config.photos || [];
        const columns = CONFIG.photos.columns;
        const rows = Math.max(1, Math.ceil(photos.length / columns));
        const visibleColumns = Math.min(columns, Math.max(1, photos.length));

        return {
          columns,
          rows,
          width: CONFIG.photos.width + (visibleColumns - 1) * CONFIG.photos.spacingX,
          height: CONFIG.photos.height + (rows - 1) * CONFIG.photos.spacingY,
          centerX: CONFIG.photos.offsetX || 0,
          centerY: CONFIG.photos.offsetY || 0
        };
      }

      getSideVideoPosition() {
        const gallery = this.getGalleryLayout();

        return {
          x: gallery.centerX - gallery.width / 2 - CONFIG.video.sideGap - CONFIG.video.width / 2,
          y: gallery.centerY,
          z: CONFIG.video.z + 0.08
        };
      }

      buildGallery() {
        const photos = this.config.photos || [];
        const { columns, spacingX, spacingY, z, offsetX = 0, offsetY = 0 } = CONFIG.photos;
        const rows = Math.ceil(photos.length / columns);

        photos.forEach((url, index) => {
          const col = index % columns;
          const row = Math.floor(index / columns);
          const colCenter = (columns - 1) / 2;
          const rowCenter = (rows - 1) / 2;

          const card = createPhotoCard(url, this, index);
          card.group.position.set(
            offsetX + (col - colCenter) * spacingX,
            offsetY + (rowCenter - row) * spacingY,
            z
          );
          card.group.scale.setScalar(0.9);

          this.worldGroup.add(card.group);
          this.photoCards.push(card);
          this.photoPickMeshes.push(card.image);
          this.app.registerPhotoPickMesh(card.image);
        });
      }

      showGallery() {
        this.photoCards.forEach((card, index) => {
          card.group.visible = true;
          setObjectOpacity(card.group, 0);
          card.group.scale.setScalar(0.9);

          window.setTimeout(() => {
            if (!this.isTracking) return;

            Tween.to({
              duration: 320,
              onUpdate: (t) => {
                setObjectOpacity(card.group, t);
                card.group.scale.setScalar(0.9 + t * 0.1);
              }
            });
          }, index * 60);
        });
      }

      setGalleryDimmed(isDimmed) {
        if (this.config.type !== 'gallery') return;

        const targetOpacity = isDimmed ? 0.28 : 1;

        this.photoCards.forEach((card) => {
          Tween.to({
            duration: 180,
            onUpdate: (t) => {
              const opacity = isDimmed ? 1 - t * (1 - targetOpacity) : targetOpacity + t * (1 - targetOpacity);
              setObjectOpacity(card.group, opacity);
            }
          });
        });
      }

      update() {
        if (!this.isTracking) return;
        this.copyAnchorPose();
      }
    }

    class ARApp {
      constructor() {
        this.container = $(CONFIG.containerSelector);
        this.startButton = $('#start-btn');
        this.toast = new StatusToast($('#status'));
        this.mindarThree = null;
        this.renderer = null;
        this.scene = null;
        this.camera = null;
        this.targets = [];
        this.photoPickMeshes = [];
        this.targetPickMeshes = [];
        this.raycaster = new THREE.Raycaster();
        this.pointer = new THREE.Vector2();
        this.videoOverlay = null;
      }

      async start() {
        this.startButton.disabled = true;
        this.startButton.textContent = 'A iniciar...';
        this.toast.show('A preparar a câmara...', 0);

        this.mindarThree = new MindARThree({
          container: this.container,
          imageTargetSrc: CONFIG.targetFile,
          maxTrack: CONFIG.tracking.maxTrack,
          warmupTolerance: CONFIG.tracking.warmupTolerance,
          missTolerance: CONFIG.tracking.missTolerance,
          filterMinCF: CONFIG.tracking.filterMinCF,
          filterBeta: CONFIG.tracking.filterBeta,
          uiLoading: 'no',
          uiScanning: 'no',
          uiError: 'no'
        });

        const { renderer, scene, camera } = this.mindarThree;
        this.renderer = renderer;
        this.scene = scene;
        this.camera = camera;

        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
        this.renderer.outputColorSpace = THREE.SRGBColorSpace;

        this.videoOverlay = new VideoOverlayManager(this);
        this.createTargets();
        this.bindPointerEvents();

        try {
          await this.mindarThree.start();
          this.fixCameraLayering();
          this.startButton.style.display = 'none';
          this.toast.show('Aponta a camara para a imagem');

          this.renderer.setAnimationLoop(() => {
            this.targets.forEach((target) => target.update());
            this.renderer.render(this.scene, this.camera);
          });
        } catch (error) {
          console.error(error);
          this.toast.show('Erro ao iniciar AR. Verifica permissões e HTTPS.', 4000);
          this.startButton.disabled = false;
          this.startButton.textContent = 'Tentar novamente';
          this.startButton.style.display = 'block';
        }
      }

      createTargets() {
        this.targets = CONFIG.targets.map((targetConfig, index) => (
          new TargetController(this, index, targetConfig)
        ));
      }

      registerPhotoPickMesh(mesh) {
        this.photoPickMeshes.push(mesh);
      }

      registerTargetPickMesh(mesh) {
        this.targetPickMeshes.push(mesh);
      }

      fixCameraLayering() {
        const video = this.mindarThree?.video;

        if (video) {
          video.style.zIndex = '0';
          video.style.pointerEvents = 'none';
          video.style.display = 'block';
        }

        if (this.renderer?.domElement) {
          this.renderer.domElement.style.zIndex = '1';
          this.renderer.domElement.style.pointerEvents = 'auto';
          this.renderer.domElement.style.background = 'transparent';
        }

        if (this.mindarThree?.cssRenderer?.domElement) {
          this.mindarThree.cssRenderer.domElement.style.zIndex = '2';
          this.mindarThree.cssRenderer.domElement.style.pointerEvents = 'none';
        }
      }

      bindPointerEvents() {
        this.renderer.domElement.addEventListener('pointerdown', (event) => {
          this.handlePointerDown(event);
        }, { passive: true });
      }

      handlePointerDown(event) {
        if (this.videoOverlay?.current) return;
        if (!this.photoPickMeshes.length && !this.targetPickMeshes.length) return;

        const rect = this.renderer.domElement.getBoundingClientRect();
        this.pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        this.pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        this.raycaster.setFromCamera(this.pointer, this.camera);

        const photoHit = this.raycaster
          .intersectObjects(this.photoPickMeshes, false)
          .find((item) => {
            const controller = item.object.userData.controller;
            return controller?.isTracking && controller.worldGroup.visible;
          });

        if (photoHit) {
          const controller = photoHit.object.userData.controller;
          this.videoOverlay.open({
            src: controller.config.video,
            controller
          });
          return;
        }

        const targetHit = this.raycaster
          .intersectObjects(this.targetPickMeshes, false)
          .find((item) => {
            const controller = item.object.userData.controller;
            return controller?.isTracking && controller.worldGroup.visible;
          });

        if (!targetHit) return;

        targetHit.object.userData.controller.activateGalleryFromTap();
      }
    }

    const app = new ARApp();
    $('#start-btn').addEventListener('click', () => app.start(), { once: true });
  </script>
</body>
</html>
