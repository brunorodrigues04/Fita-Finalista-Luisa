<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Fita</title>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden; font-family: sans-serif; color: white; }
    .mindar-ui-overlay, .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }

    #start-btn {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      padding: 1rem 2rem;
      background: #c9a84c; color: #000;
      border: none; font-size: 1rem;
      cursor: pointer; border-radius: 4px;
      z-index: 10;
    }

    #status {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      padding: 0.5rem 1.2rem; border-radius: 20px;
      font-size: 0.8rem; z-index: 10;
      text-align: center;
      transition: opacity 0.5s;
      display: none;
    }

    #ar-container { width: 100vw; height: 100vh; }
  </style>
</head>
<body>

<button id="start-btn">Iniciar AR</button>
<div id="status"></div>
<div id="ar-container"></div>

<script type="module">
import * as THREE from 'three';
import { MindARThree } from 'mindar-image-three';

const status = document.getElementById('status');
let experienceTriggered = false;

document.getElementById('start-btn').addEventListener('click', async () => {
  document.getElementById('start-btn').style.display = 'none';

  // ── Vídeo HTML ──
  const video = document.createElement('video');
  video.src = 'assets/video.mp4'; // coloca o teu ficheiro aqui
  video.crossOrigin = 'anonymous';
  video.loop = true;
  video.muted = true;      // necessário para autoplay no mobile
  video.playsInline = true;
  video.preload = 'auto';

  const videoTexture = new THREE.VideoTexture(video);
  videoTexture.minFilter = THREE.LinearFilter;
  videoTexture.magFilter = THREE.LinearFilter;

  const mindarThree = new MindARThree({
    container: document.getElementById('ar-container'),
    imageTargetSrc: 'assets/targets.mind',
    maxTrack: 1,
    uiLoading: 'no',
    uiScanning: 'no',
    uiError: 'no',
  });

  const { renderer, scene, camera } = mindarThree;
  const anchor = mindarThree.addAnchor(0);

  // ── Plano de vídeo ancorado à fita ──
  // No MindAR, 1 unidade ≈ largura da imagem target
  // x: 0.8 = ~80% da largura da fita para a direita
  // y: 0   = mesma altura da fita
  // z: 0   = mesmo plano
  const videoMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(0.6, 0.338), // proporção 16:9
    new THREE.MeshBasicMaterial({ map: videoTexture, side: THREE.DoubleSide })
  );

  // Posição relativa à fita — ajusta o x para mais perto ou mais longe
  videoMesh.position.set(0.8, 0, 0); // 0.8 unidades à direita da fita
  videoMesh.visible = false;

  anchor.group.add(videoMesh);

  anchor.onTargetFound = () => {
    if (experienceTriggered) return;
    experienceTriggered = true;

    videoMesh.visible = true;
    video.play().catch(err => console.error('Erro vídeo:', err));

    showStatus('▶ A reproduzir');
  };

  anchor.onTargetLost = () => {
    // Vídeo continua — mas como está no anchor, desaparece com a fita
    // Se quiseres que fique no ar mesmo assim, diz-me e mudamos
  };

  try {
    await mindarThree.start();
    renderer.setAnimationLoop(() => renderer.render(scene, camera));
  } catch(err) {
    showStatus('Erro: ' + err.message);
    console.error(err);
  }
});

function showStatus(msg) {
  status.style.display = 'block';
  status.style.opacity = '1';
  status.textContent = msg;
  setTimeout(() => { status.style.opacity = '0'; }, 2000);
  setTimeout(() => { status.style.display = 'none'; status.style.opacity = '1'; }, 2600);
}
</script>
</body>
</html>
