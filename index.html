<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Fita</title>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden; font-family: sans-serif; color: white; }
    .mindar-ui-overlay, .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }

    #start-btn {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      padding: 1rem 2rem;
      background: #c9a84c; color: #000;
      border: none; font-size: 1rem;
      cursor: pointer; border-radius: 4px;
      z-index: 10;
    }

    #status {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      padding: 0.5rem 1.2rem; border-radius: 20px;
      font-size: 0.8rem; z-index: 10;
      text-align: center;
      transition: opacity 0.5s;
      display: none;
    }

    #ar-container { width: 100vw; height: 100vh; }

    /* ── ESTILOS DOS CANTOS DE FOCO (HUD) ── */
    #focus-corners {
      position: fixed; top: 50%; left: 50%;
      /* O scale inicial é ligeiramente menor para dar o efeito de foco */
      transform: translate(-50%, -50%) scale(0.9);
      width: 70vw; height: 50vh;
      max-width: 350px; max-height: 450px;
      z-index: 15; pointer-events: none;
      opacity: 0; /* Invisível no início */
      transition: all 0.3s ease-out;
    }

    /* Animação de entrada (Surge Verde) */
    #focus-corners.show-green {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    /* Animação de saída (Desaparece) */
    #focus-corners.fade-out {
      opacity: 0;
      transform: translate(-50%, -50%) scale(1.1);
      transition: all 0.6s ease-out;
    }

    /* Formato de cada canto individual */
    .corner {
      position: absolute;
      width: 40px; height: 40px;
      border-color: #00ff00; /* Verde Foco */
      border-style: solid;
    }

    .top-left { top: 0; left: 0; border-width: 4px 0 0 4px; border-top-left-radius: 4px; }
    .top-right { top: 0; right: 0; border-width: 4px 4px 0 0; border-top-right-radius: 4px; }
    .bottom-left { bottom: 0; left: 0; border-width: 0 0 4px 4px; border-bottom-left-radius: 4px; }
    .bottom-right { bottom: 0; right: 0; border-width: 0 4px 4px 0; border-bottom-right-radius: 4px; }
  </style>
</head>
<body>

<button id="start-btn">Iniciar AR</button>
<div id="status"></div>

<div id="focus-corners">
  <div class="corner top-left"></div>
  <div class="corner top-right"></div>
  <div class="corner bottom-left"></div>
  <div class="corner bottom-right"></div>
</div>

<div id="ar-container"></div>

<script type="module">
import * as THREE from 'three';
import { MindARThree } from 'mindar-image-three';

const status = document.getElementById('status');
const focusCorners = document.getElementById('focus-corners');
let experienceTriggered = false;

document.getElementById('start-btn').addEventListener('click', async () => {
  document.getElementById('start-btn').style.display = 'none';

  // ── Vídeo HTML ──
  const video = document.createElement('video');
  video.src = 'assets/video.mp4';
  video.crossOrigin = 'anonymous';
  video.loop = true;
  video.muted = true;
  video.playsInline = true;
  video.preload = 'auto';

  const videoTexture = new THREE.VideoTexture(video);
  videoTexture.minFilter = THREE.LinearFilter;
  videoTexture.magFilter = THREE.LinearFilter;

  const mindarThree = new MindARThree({
    container: document.getElementById('ar-container'),
    imageTargetSrc: 'assets/targets.mind',
    maxTrack: 1,
    uiLoading: 'no',
    uiScanning: 'no',
    uiError: 'no',
  });

  const { renderer, scene, camera } = mindarThree;
  const anchor = mindarThree.addAnchor(0);

  // ── Plano de vídeo ancorado à fita ──
  const videoMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(0.6, 0.338),
    new THREE.MeshBasicMaterial({ map: videoTexture, side: THREE.DoubleSide })
  );

  videoMesh.position.set(0.8, 0, 0);
  videoMesh.visible = false;

  anchor.group.add(videoMesh);

  anchor.onTargetFound = () => {
    if (experienceTriggered) return;
    experienceTriggered = true;

    // ── Ativar Cantos Verdes ──
    focusCorners.classList.add('show-green');

    // ── Ocultar os cantos após 1.2 segundos ──
    setTimeout(() => {
      focusCorners.classList.add('fade-out');
    }, 1200);

    videoMesh.visible = true;
    video.play().catch(err => console.error('Erro vídeo:', err));

    showStatus('▶ A reproduzir');
  };

  anchor.onTargetLost = () => {
    // Código para quando a imagem sai do ecrã
  };

  try {
    await mindarThree.start();
    renderer.setAnimationLoop(() => renderer.render(scene, camera));
  } catch(err) {
    showStatus('Erro: ' + err.message);
    console.error(err);
  }
});

function showStatus(msg) {
  status.style.display = 'block';
  status.style.opacity = '1';
  status.textContent = msg;
  setTimeout(() => { status.style.opacity = '0'; }, 2000);
  setTimeout(() => { status.style.display = 'none'; status.style.opacity = '1'; }, 2600);
}
</script>
</body>
</html>
